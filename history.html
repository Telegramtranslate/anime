<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="История просмотров — AnimeVault. Продолжайте смотреть с того места, где остановились.">
  <title>AnimeVault — История</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/history.css">
  <link rel="stylesheet" href="css/animations.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="history-page">
    <div class="container">
      <!-- Заголовок -->
      <div class="history-header">
        <div>
          <h1 class="section-title" style="margin-bottom:8px">История просмотров</h1>
          <div class="favorites-count" id="historyCount">
            <span>0</span> записей
          </div>
        </div>
        <div class="history-actions">
          <button class="history-clear-btn" id="clearHistory">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px">
              <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
            </svg>
            Очистить всё
          </button>
        </div>
      </div>

      <!-- Список истории -->
      <div class="history-list" id="historyList">
        <!-- Пустое состояние (JS) или записи -->
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <!-- JavaScript -->
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/search.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
