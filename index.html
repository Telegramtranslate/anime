<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AnimeVault — Мир аниме в твоих руках. Смотри популярные аниме онлайн в хорошем качестве.">
  <title>AnimeVault — Главная</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/hero.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/slider.css">
  <link rel="stylesheet" href="css/animations.css">

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <!-- Header placeholder -->
  <div id="header-placeholder"></div>

  <main>
    <!-- ═══════════ HERO ═══════════ -->
    <section class="hero" id="heroSection">
      <canvas id="heroCanvas"></canvas>
      <div class="hero-overlay"></div>
      <img class="hero-bg" src="assets/images/hero-bg.jpg" alt="" aria-hidden="true" loading="eager">

      <div class="hero-content">
        <h1 class="hero-logo">
          Anime<span class="gold">Vault</span>
        </h1>
        <div class="hero-divider"></div>
        <p class="hero-slogan">Мир аниме в твоих руках</p>
        <a href="catalog.html" class="hero-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Начать просмотр
        </a>
      </div>

      <div class="scroll-indicator">
        <div class="mouse">
          <div class="mouse-dot"></div>
        </div>
        <span>Листай</span>
      </div>
    </section>

    <!-- ═══════════ В ТРЕНДЕ ═══════════ -->
    <section class="section slider-section reveal">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">В тренде</h2>
          <div class="slider-nav">
            <button class="slider-btn" id="trendingPrev" title="Назад">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <button class="slider-btn" id="trendingNext" title="Вперёд">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          </div>
        </div>
        <div class="slider-container trending-slider" id="trendingSlider">
          <div class="slider-track"></div>
        </div>
      </div>
    </section>

    <!-- ═══════════ ПОПУЛЯРНОЕ ═══════════ -->
    <section class="section reveal">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Популярное</h2>
          <a href="catalog.html" class="section-link">Смотреть всё →</a>
        </div>
        <div class="popular-grid" id="popularGrid"></div>
      </div>
    </section>

    <!-- ═══════════ ПРОДОЛЖИТЬ ПРОСМОТР ═══════════ -->
    <section class="section slider-section reveal">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Продолжить просмотр</h2>
          <div class="slider-nav">
            <button class="slider-btn" id="continuePrev" title="Назад">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <button class="slider-btn" id="continueNext" title="Вперёд">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          </div>
        </div>
        <div class="slider-container continue-slider" id="continueSlider">
          <div class="slider-track"></div>
        </div>
      </div>
    </section>

    <!-- ═══════════ НОВЫЕ СЕРИИ ═══════════ -->
    <section class="section slider-section reveal">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Новые серии</h2>
          <div class="slider-nav">
            <button class="slider-btn" id="newEpisodesPrev" title="Назад">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <button class="slider-btn" id="newEpisodesNext" title="Вперёд">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          </div>
        </div>
        <div class="slider-container new-episodes-slider" id="newEpisodesSlider">
          <div class="slider-track"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer placeholder -->
  <div id="footer-placeholder"></div>

  <!-- JavaScript -->
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/slider.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/search.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
