<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Каталог аниме — AnimeVault. Фильтруй по жанрам, году, статусу и сортируй по рейтингу.">
  <title>AnimeVault — Каталог</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/catalog.css">
  <link rel="stylesheet" href="css/animations.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="catalog-page">
    <div class="container">
      <div class="catalog-layout">
        <!-- ═══════ ФИЛЬТРЫ ═══════ -->
        <aside class="catalog-filters">
          <h3 class="filters-title">Фильтры</h3>

          <!-- Поиск -->
          <div class="filter-group">
            <label class="filter-label">Поиск</label>
            <div class="filter-search">
              <input type="text" id="catalogSearch" placeholder="Название аниме..." autocomplete="off">
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
              </svg>
            </div>
          </div>

          <!-- Жанры -->
          <div class="filter-group">
            <label class="filter-label">Жанр</label>
            <div class="genre-checkboxes" id="genreCheckboxes"></div>
          </div>

          <!-- Год -->
          <div class="filter-group">
            <label class="filter-label">Год</label>
            <select class="filter-select" id="filterYear"></select>
          </div>

          <!-- Статус -->
          <div class="filter-group">
            <label class="filter-label">Статус</label>
            <select class="filter-select" id="filterStatus">
              <option value="">Все</option>
              <option value="ongoing">Онгоинг</option>
              <option value="released">Завершён</option>
              <option value="announced">Анонс</option>
            </select>
          </div>

          <!-- Сортировка -->
          <div class="filter-group">
            <label class="filter-label">Сортировка</label>
            <select class="filter-select" id="filterSort">
              <option value="rating">По рейтингу</option>
              <option value="date">По дате</option>
              <option value="title">По названию</option>
              <option value="year">По году</option>
            </select>
          </div>

          <!-- Кнопки -->
          <div class="filter-actions">
            <button class="btn btn-gold" id="applyFilters">Применить</button>
            <button class="btn btn-ghost" id="resetFilters">Сбросить</button>
          </div>
        </aside>

        <!-- ═══════ РЕЗУЛЬТАТЫ ═══════ -->
        <div class="catalog-results">
          <div class="catalog-toolbar">
            <div class="catalog-count" id="resultsCount">
              Найдено: <span>0</span> аниме
            </div>
            <div class="catalog-view-toggle">
              <button class="view-btn active" id="viewGrid" title="Сетка">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="7" height="7" rx="1"/>
                  <rect x="14" y="3" width="7" height="7" rx="1"/>
                  <rect x="3" y="14" width="7" height="7" rx="1"/>
                  <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
              </button>
              <button class="view-btn" id="viewList" title="Список">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="4" width="18" height="4" rx="1"/>
                  <rect x="3" y="10" width="18" height="4" rx="1"/>
                  <rect x="3" y="16" width="18" height="4" rx="1"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Сетка карточек -->
          <div class="catalog-grid" id="catalogGrid"></div>

          <!-- Пагинация -->
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <!-- JavaScript -->
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/search.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
