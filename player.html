<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Плеер AnimeVault — смотри аниме онлайн в хорошем качестве.">
  <title>AnimeVault — Плеер</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/player.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/animations.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="player-page">
    <!-- ═══════ ПЛЕЕР + СЕРИИ ═══════ -->
    <div class="player-main">
      <!-- Плеер -->
      <div class="player-wrapper">
        <iframe 
          id="kodikPlayer"
          src=""
          width="100%"
          height="100%"
          frameborder="0"
          allow="autoplay *; fullscreen *"
          allowfullscreen>
        </iframe>
      </div>

      <!-- Боковая панель с сериями -->
      <div class="player-sidebar">
        <div class="sidebar-header">
          <h3>Список серий</h3>
          <div class="episode-count" id="episodeCount">0 / 0</div>
        </div>
        
        <!-- Переводы (заглушка) -->
        <div class="sidebar-translations" id="translationsList">
          <button class="translation-tab active">Оригинал</button>
          <button class="translation-tab">Субтитры</button>
        </div>

        <!-- Список серий -->
        <div class="episodes-list" id="episodesList">
          <div class="loader-container"><div class="loader"></div></div>
        </div>
      </div>
    </div>

    <!-- ═══════ УПРАВЛЕНИЕ ═══════ -->
    <div class="player-controls">
      <button class="episode-nav-btn" id="prevEpisode" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        Предыдущая
      </button>
      <span class="current-episode-label" id="currentEpisodeLabel">Серия 1 из 1</span>
      <button class="episode-nav-btn" id="nextEpisode" disabled>
        Следующая
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <!-- ═══════ ИНФОРМАЦИЯ ═══════ -->
    <div class="container">
      <div class="player-info">
        <div class="player-info-grid">
          <div class="player-poster">
            <div id="playerPoster" style="width:100%;aspect-ratio:2/3;border-radius:12px;overflow:hidden"></div>
          </div>
          <div class="player-details">
            <h1 class="title" id="playerTitle">Загрузка...</h1>
            <div class="title-original" id="playerTitleOriginal"></div>
            
            <div class="tags" id="playerTags"></div>
            
            <p class="description" id="playerDescription">Загрузка информации...</p>
            
            <div class="meta-grid" id="playerMeta"></div>
          </div>
        </div>
      </div>

      <!-- ═══════ ПОХОЖЕЕ ═══════ -->
      <section class="similar-section">
        <div class="section-header">
          <h2 class="section-title">Похожее аниме</h2>
        </div>
        <div class="similar-grid" id="similarGrid"></div>
      </section>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <!-- JavaScript -->
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/search.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/player.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
